name: Build & Release empy

# Triggers on any tag that looks like v3.x.x
on:
  push:
    tags:
      - "v[0-9]*.[0-9]*.[0-9]*"
  workflow_dispatch:        # allow manual runs from the Actions tab

permissions:
  contents: write           # needed to create GitHub Releases

# ─────────────────────────────────────────────────────────────────────────────
jobs:

  build:
    name: Build · ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-22.04
            artifact_name: empy-linux-x64
            exe_suffix: ""
          - os: macos-13           # Intel/x64 — last runner guaranteed to be x86_64
            artifact_name: empy-macos-x64
            exe_suffix: ""
          - os: macos-15           # Apple Silicon arm64 (M-series); use macos-14 if 15 unavailable
            artifact_name: empy-macos-arm64
            exe_suffix: ""
          - os: windows-latest
            artifact_name: empy-windows-x64.exe
            exe_suffix: ".exe"

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── 2. Python ────────────────────────────────────────────────────────
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"   # 3.11 produces the smallest Nuitka output

      # ── 3. C compiler (Linux only — macOS has clang, Windows has MSVC) ──
      - name: Install GCC (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -qq && sudo apt-get install -y gcc patchelf

      # ── 4. Python dependencies ───────────────────────────────────────────
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install cryptography nuitka zstandard ordered-set

      # ── 5. Compile with Nuitka ───────────────────────────────────────────
      # Nuitka compiles Python → C → native machine code.
      # --onefile        : single self-contained executable, no installer needed
      # --standalone     : bundle the Python runtime; no Python required on target
      # --remove-output  : delete intermediate C files after compile
      # --no-pyi-file    : don't emit stub files
      # --python-flag=no_docstrings : strip all docstrings from bytecode
      # --python-flag=no_annotations: strip type annotations
      # --noinclude-default-mode=nofollow: don't pull in unused stdlib modules
      - name: Compile (Unix)
        if: runner.os != 'Windows'
        run: |
          python -m nuitka \
            --onefile \
            --standalone \
            --remove-output \
            --no-pyi-file \
            --python-flag=no_docstrings \
            --python-flag=no_annotations \
            --output-filename=empy \
            --assume-yes-for-downloads \
            empy.py
          chmod +x empy
          mv empy ${{ matrix.artifact_name }}

      - name: Compile (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -m nuitka `
            --onefile `
            --standalone `
            --remove-output `
            --no-pyi-file `
            --python-flag=no_docstrings `
            --python-flag=no_annotations `
            --output-filename=empy.exe `
            --assume-yes-for-downloads `
            --windows-console-mode=attach `
            empy.py
          Move-Item empy.exe ${{ matrix.artifact_name }}

      # ── 6. Quick smoke-test ───────────────────────────────────────────────
      - name: Smoke test (Unix)
        if: runner.os != 'Windows'
        run: |
          ./${{ matrix.artifact_name }} --version
          echo "test content" > /tmp/smoke.txt
          ./${{ matrix.artifact_name }} encrypt /tmp/smoke.txt -p testpassword12 -f
          ./${{ matrix.artifact_name }} decrypt /tmp/smoke.txt.empy -p testpassword12 --outdir /tmp/out/ -f
          diff /tmp/smoke.txt /tmp/out/smoke.txt && echo "Smoke test PASSED"

      - name: Smoke test (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\${{ matrix.artifact_name }} --version
          "test content" | Out-File -FilePath smoke.txt -Encoding utf8
          .\${{ matrix.artifact_name }} encrypt smoke.txt -p testpassword12 -f
          .\${{ matrix.artifact_name }} decrypt smoke.txt.empy -p testpassword12 --outdir out\ -f
          if ((Get-Content smoke.txt) -eq (Get-Content out\smoke.txt)) { Write-Host "Smoke test PASSED" } else { exit 1 }

      # ── 7. Upload artifact ────────────────────────────────────────────────
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}
          if-no-files-found: error

  # ──────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist/

      # Flatten: each artifact lands in dist/<name>/<name>, move to dist/
      - name: Flatten artifact directories
        run: |
          find dist/ -type f | while read f; do
            mv "$f" "dist/$(basename $f)"
          done
          find dist/ -type d -empty -delete
          ls -lh dist/

      # Generate SHA-256 checksums for all binaries
      - name: Generate checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # Build release notes from git log since last tag
      - name: Build release notes
        id: notes
        run: |
          PREV=$(git tag --sort=-creatordate | sed -n '2p' || echo "")
          echo "## empy ${GITHUB_REF_NAME} — Empyrean Secure Compression" > notes.md
          echo "**Copyright Volvi 2026**" >> notes.md
          echo "" >> notes.md
          echo "### Binaries" >> notes.md
          echo "| Platform | File |" >> notes.md
          echo "|---|---|" >> notes.md
          echo "| Linux x64   | \`empy-linux-x64\` |" >> notes.md
          echo "| macOS x64   | \`empy-macos-x64\` |" >> notes.md
          echo "| macOS arm64 | \`empy-macos-arm64\` |" >> notes.md
          echo "| Windows x64 | \`empy-windows-x64.exe\` |" >> notes.md
          echo "" >> notes.md
          echo "### Quick start" >> notes.md
          echo '```bash' >> notes.md
          echo "# macOS / Linux — make executable first:" >> notes.md
          echo "chmod +x empy-linux-x64   # or empy-macos-x64 / empy-macos-arm64" >> notes.md
          echo "./empy-linux-x64          # opens GUI in browser" >> notes.md
          echo "./empy-linux-x64 encrypt photo.jpg   # CLI encrypt" >> notes.md
          echo "" >> notes.md
          echo "# Windows:" >> notes.md
          echo "empy-windows-x64.exe      # opens GUI in browser" >> notes.md
          echo '```' >> notes.md
          echo "" >> notes.md
          if [ -n "$PREV" ]; then
            echo "### Changes since $PREV" >> notes.md
            git log --oneline "$PREV..HEAD" >> notes.md
          fi
          cat notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "empy ${{ github.ref_name }} — Empyrean Secure Compression"
          body_path: notes.md
          files: |
            dist/empy-linux-x64
            dist/empy-macos-x64
            dist/empy-macos-arm64
            dist/empy-windows-x64.exe
            dist/SHA256SUMS.txt
          draft: false
          prerelease: false
